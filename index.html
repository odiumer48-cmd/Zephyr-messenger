<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚡ Zephyr Messenger</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6C5CE7;
            --primary-dark: #5A4BD1;
            --primary-light: #A29BFE;
            --bg: #F8F9FD;
            --surface: #FFFFFF;
            --text: #2D3436;
            --text-secondary: #636E72;
            --border: #E2E8F0;
            --online: #00B894;
            --sent-msg: linear-gradient(135deg, #6C5CE7, #A29BFE);
            --received-msg: #F1F3F9;
            --shadow: 0 4px 20px rgba(108, 92, 231, 0.1);
            --radius: 16px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', 'Segoe UI', sans-serif;
            background: var(--bg);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 900px;
            height: 90vh;
            background: var(--surface);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            display: flex;
            overflow: hidden;
        }

        /* ── Боковая панель ── */
        .sidebar {
            width: 320px;
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            background: #FAFBFC;
        }

        .sidebar-header {
            padding: 20px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
        }

        .logo-text {
            font-size: 22px;
            font-weight: 700;
            color: var(--primary);
            letter-spacing: -0.5px;
        }

        .header-actions {
            display: flex;
            gap: 8px;
        }

        .icon-btn {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            border: none;
            background: var(--surface);
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }

        .icon-btn:hover {
            background: var(--primary);
            color: white;
        }

        .icon-btn.active {
            background: var(--primary);
            color: white;
        }

        .search-box {
            padding: 12px 16px;
            position: relative;
        }

        .search-box input {
            width: 100%;
            padding: 10px 14px 10px 38px;
            border: 2px solid var(--border);
            border-radius: 25px;
            font-size: 14px;
            background: var(--surface);
            transition: all 0.3s;
            outline: none;
            font-family: 'Inter', sans-serif;
        }

        .search-box input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(108, 92, 231, 0.1);
        }

        .search-box .search-icon {
            position: absolute;
            left: 28px;
            top: 20px;
            color: #999;
            font-size: 16px;
        }

        .contacts-list {
            flex: 1;
            overflow-y: auto;
            padding: 8px;
        }

        .contact-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s;
            margin-bottom: 2px;
        }

        .contact-item:hover {
            background: #EDEFF7;
        }

        .contact-item.selected {
            background: #E8E6FF;
        }

        .avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: var(--primary-light);
            flex-shrink: 0;
            position: relative;
        }

        .avatar img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
        }

        .online-dot {
            width: 10px;
            height: 10px;
            background: var(--online);
            border-radius: 50%;
            border: 2px solid white;
            position: absolute;
            bottom: 2px;
            right: 2px;
        }

        .contact-info {
            flex: 1;
            min-width: 0;
        }

        .contact-name {
            font-weight: 600;
            font-size: 15px;
            color: var(--text);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .contact-lastmsg {
            font-size: 13px;
            color: var(--text-secondary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .no-contacts {
            text-align: center;
            color: #999;
            padding: 40px 20px;
            font-size: 14px;
        }

        /* ── Основная область чата ── */
        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-width: 0;
        }

        .chat-header {
            padding: 16px 20px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: var(--surface);
        }

        .chat-user {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .chat-user .avatar {
            width: 44px;
            height: 44px;
        }

        .chat-user-name {
            font-weight: 600;
            font-size: 16px;
            color: var(--text);
        }

        .chat-user-status {
            font-size: 12px;
            color: var(--online);
            font-weight: 500;
        }

        .messages-container {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 8px;
            background: #FAFBFC;
        }

        .message {
            max-width: 75%;
            padding: 10px 16px;
            border-radius: 18px;
            word-wrap: break-word;
            animation: fadeIn 0.3s ease;
            font-size: 14px;
            line-height: 1.4;
        }

        .message.sent {
            align-self: flex-end;
            background: var(--sent-msg);
            color: white;
            border-bottom-right-radius: 4px;
        }

        .message.received {
            align-self: flex-start;
            background: var(--received-msg);
            color: var(--text);
            border-bottom-left-radius: 4px;
        }

        .message .msg-sender {
            font-size: 11px;
            font-weight: 600;
            margin-bottom: 2px;
            opacity: 0.8;
            display: block;
        }

        .message-input-area {
            display: flex;
            padding: 14px 20px;
            gap: 10px;
            border-top: 1px solid var(--border);
            background: var(--surface);
            align-items: center;
        }

        .message-input-area input {
            flex: 1;
            padding: 12px 18px;
            border: 2px solid var(--border);
            border-radius: 25px;
            font-size: 14px;
            outline: none;
            font-family: 'Inter', sans-serif;
            transition: all 0.3s;
        }

        .message-input-area input:focus {
            border-color: var(--primary);
        }

        .btn-send {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: var(--primary);
            color: white;
            border: none;
            font-size: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            flex-shrink: 0;
        }

        .btn-send:hover {
            background: var(--primary-dark);
            transform: scale(1.05);
        }

        /* ── Экран логина ── */
        .auth-screen {
            width: 100%;
            max-width: 420px;
            margin: auto;
            padding: 40px;
            background: var(--surface);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            text-align: center;
        }

        .auth-screen .logo {
            font-size: 48px;
            margin-bottom: 10px;
        }

        .auth-screen h1 {
            font-size: 28px;
            color: var(--text);
            margin-bottom: 5px;
        }

        .auth-screen .subtitle {
            color: var(--text-secondary);
            margin-bottom: 30px;
            font-size: 14px;
        }

        .auth-form {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .auth-form input {
            padding: 14px 16px;
            border: 2px solid var(--border);
            border-radius: 12px;
            font-size: 15px;
            outline: none;
            font-family: 'Inter', sans-serif;
            transition: all 0.3s;
        }

        .auth-form input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(108, 92, 231, 0.1);
        }

        .btn {
            padding: 14px;
            border: none;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            font-family: 'Inter', sans-serif;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
        }

        .btn-primary:hover {
            background: var(--primary-dark);
            transform: translateY(-1px);
        }

        .btn-link {
            background: none;
            color: var(--primary);
            font-weight: 500;
        }

        .error-msg {
            color: #E74C3C;
            font-size: 13px;
            background: #FFF0F0;
            padding: 10px;
            border-radius: 8px;
            display: none;
        }

        .error-msg.show { display: block; }

        /* ── Модальные окна ── */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.4);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            backdrop-filter: blur(4px);
        }

        .modal-overlay.show { display: flex; }

        .modal {
            background: white;
            border-radius: var(--radius);
            padding: 30px;
            max-width: 400px;
            width: 90%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.2);
        }

        .modal h3 {
            text-align: center;
            margin-bottom: 20px;
            color: var(--text);
        }

        .modal .form-group {
            margin-bottom: 16px;
        }

        .modal .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: var(--text-secondary);
            margin-bottom: 6px;
        }

        .modal .form-group input {
            width: 100%;
            padding: 12px;
            border: 2px solid var(--border);
            border-radius: 10px;
            font-size: 14px;
            font-family: 'Inter', sans-serif;
            outline: none;
        }

        .modal .form-group input:focus {
            border-color: var(--primary);
        }

        .modal .avatar-preview {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            margin: 0 auto 15px;
            display: block;
            background: var(--primary-light);
        }

        .modal .btn {
            width: 100%;
            margin-top: 4px;
        }

        .empty-chat {
            text-align: center;
            color: #aaa;
            margin-top: 150px;
            font-size: 15px;
        }

        .welcome-screen {
            text-align: center;
            margin-top: 120px;
        }

        .welcome-screen .big-logo {
            font-size: 72px;
            margin-bottom: 20px;
        }

        .welcome-screen h2 {
            color: var(--text);
            margin-bottom: 8px;
        }

        .welcome-screen p {
            color: var(--text-secondary);
            font-size: 14px;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Скроллбар */
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #ddd; border-radius: 10px; }

        /* Кнопка поиска пользователей */
        .search-results {
            max-height: 200px;
            overflow-y: auto;
        }
        .search-result-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px;
            cursor: pointer;
            border-radius: 8px;
        }
        .search-result-item:hover {
            background: #f0f0f0;
        }
    </style>
</head>
<body>
    <!-- Основной контейнер (чат) -->
    <div class="container" id="main-container" style="display:none;">
        <!-- Боковая панель -->
        <div class="sidebar">
            <div class="sidebar-header">
                <span class="logo-text">⚡ Zephyr</span>
                <div class="header-actions">
                    <button class="icon-btn" onclick="openSearchModal()" title="Поиск пользователей">🔍</button>
                    <button class="icon-btn" onclick="openSettingsModal()" title="Настройки">⚙️</button>
                    <button class="icon-btn" onclick="logout()" title="Выйти" style="color:#E74C3C;">🚪</button>
                </div>
            </div>
            <div class="search-box">
                <span class="search-icon">🔍</span>
                <input type="text" id="contact-search" placeholder="Поиск чатов..." oninput="filterContacts()">
            </div>
            <div class="contacts-list" id="contacts-list">
                <div class="no-contacts">🔍 Используйте поиск, чтобы найти собеседников</div>
            </div>
        </div>

        <!-- Область чата -->
        <div class="chat-area" id="chat-area">
            <div id="welcome-screen" class="welcome-screen">
                <div class="big-logo">⚡</div>
                <h2>Добро пожаловать в Zephyr</h2>
                <p>Выберите чат или найдите собеседника</p>
            </div>
            <div id="chat-screen" style="display:none; flex:1; flex-direction:column;">
                <div class="chat-header">
                    <div class="chat-user">
                        <div class="avatar" id="chat-avatar">
                            <img id="chat-avatar-img" src="" alt="">
                        </div>
                        <div>
                            <div class="chat-user-name" id="chat-user-name">—</div>
                            <div class="chat-user-status" id="chat-user-status">в сети</div>
                        </div>
                    </div>
                </div>
                <div class="messages-container" id="messages-container"></div>
                <div class="message-input-area">
                    <input type="text" id="message-input" placeholder="Введите сообщение..." onkeypress="handleEnter(event)">
                    <button class="btn-send" onclick="sendMessage()">➤</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Экран авторизации -->
    <div class="auth-screen" id="auth-screen">
        <div class="logo">⚡</div>
        <h1>Zephyr</h1>
        <p class="subtitle">Лёгкий и быстрый мессенджер</p>
        <form class="auth-form" onsubmit="handleAuth(event)">
            <input type="text" id="auth-nickname" placeholder="Никнейм" required minlength="3">
            <input type="email" id="auth-email" placeholder="Email" required>
            <input type="password" id="auth-password" placeholder="Пароль (мин. 6 символов)" required minlength="6">
            <div class="error-msg" id="error-msg"></div>
            <button type="submit" class="btn btn-primary" id="auth-btn">Войти</button>
            <button type="button" class="btn btn-link" onclick="toggleAuthMode()" id="toggle-btn">
                Нет аккаунта? Зарегистрироваться
            </button>
        </form>
    </div>

    <!-- Модальное окно поиска пользователей -->
    <div class="modal-overlay" id="search-modal">
        <div class="modal">
            <h3>🔍 Найти пользователя</h3>
            <div class="form-group">
                <input type="text" id="search-user-input" placeholder="Введите никнейм или email..." oninput="searchUsers()">
            </div>
            <div class="search-results" id="search-results"></div>
            <button class="btn btn-link" onclick="closeSearchModal()" style="margin-top:10px;">Закрыть</button>
        </div>
    </div>

    <!-- Модальное окно настроек -->
    <div class="modal-overlay" id="settings-modal">
        <div class="modal">
            <h3>⚙️ Настройки профиля</h3>
            <img class="avatar-preview" id="settings-avatar-preview" src="" alt="Аватар">
            <div class="form-group">
                <label>Никнейм</label>
                <input type="text" id="settings-nickname" placeholder="Ваш никнейм">
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="settings-email" disabled style="background:#f5f5f5;">
            </div>
            <p style="font-size:11px;color:#999;text-align:center;margin:8px 0;">
                Аватар генерируется автоматически на основе никнейма
            </p>
            <button class="btn btn-primary" onclick="saveSettings()">Сохранить</button>
            <button class="btn btn-link" onclick="closeSettingsModal()">Отмена</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
        import { 
            getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, 
            signOut, onAuthStateChanged, updateProfile 
        } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js';
        import { 
            getFirestore, collection, addDoc, query, orderBy, onSnapshot, 
            serverTimestamp, getDocs, where, doc, updateDoc 
        } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js';

        const firebaseConfig = {
            apiKey: "AIzaSyDl-pnacA5QLflfbsKWdDTON-AYFJ_HvLY",
            authDomain: "zephyr-messengerer.firebaseapp.com",
            projectId: "zephyr-messengerer",
            storageBucket: "zephyr-messengerer.firebasestorage.app",
            messagingSenderId: "869084755932",
            appId: "1:869084755932:web:4220f1f8a642d519920119"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // Глобальные переменные
        window.currentUser = null;
        window.currentChat = null;
        window.allUsers = [];
        window.isLoginMode = true;

        // Генератор аватарок DiceBear
        function getAvatarUrl(nickname) {
            const seed = nickname || 'default';
            return `https://api.dicebear.com/9.x/initials/svg?seed=${encodeURIComponent(seed)}&backgroundColor=6C5CE7,A29BFE,00B894,FF7675,FDCB6E`;
        }

        // Переключение режима входа/регистрации
        window.toggleAuthMode = function() {
            window.isLoginMode = !window.isLoginMode;
            document.getElementById('auth-btn').textContent = window.isLoginMode ? 'Войти' : 'Зарегистрироваться';
            document.getElementById('toggle-btn').textContent = window.isLoginMode ? 'Нет аккаунта? Зарегистрироваться' : 'Уже есть аккаунт? Войти';
            document.getElementById('error-msg').classList.remove('show');
        };

        // Авторизация
        window.handleAuth = async function(e) {
            e.preventDefault();
            const nickname = document.getElementById('auth-nickname').value.trim();
            const email = document.getElementById('auth-email').value.trim();
            const password = document.getElementById('auth-password').value;
            const errorEl = document.getElementById('error-msg');

            try {
                let userCredential;
                if (window.isLoginMode) {
                    userCredential = await signInWithEmailAndPassword(auth, email, password);
                } else {
                    userCredential = await createUserWithEmailAndPassword(auth, email, password);
                    await updateProfile(userCredential.user, { displayName: nickname });
                    // Сохраняем никнейм в Firestore
                    await updateDoc(doc(db, "users", userCredential.user.uid), {
                        nickname: nickname,
                        email: email,
                        createdAt: serverTimestamp()
                    });
                }
            } catch (error) {
                errorEl.textContent = '⚠️ ' + getRussianError(error.code);
                errorEl.classList.add('show');
            }
        };

        // Создание/обновление документа пользователя при входе
        async function ensureUserDocument(user) {
            if (!user) return;
            const userRef = doc(db, "users", user.uid);
            const userSnap = await getDocs(query(collection(db, "users"), where("email", "==", user.email)));
            
            if (userSnap.empty) {
                // Создаём документ, если его нет
                await updateDoc(userRef, {
                    nickname: user.displayName || user.email?.split('@')[0] || 'User',
                    email: user.email,
                    updatedAt: serverTimestamp()
                });
            } else {
                // Обновляем timestamp
                await updateDoc(userRef, { updatedAt: serverTimestamp() });
            }
        }

        // Выход
        window.logout = async function() {
            await signOut(auth);
        };

        // Поиск пользователей
        window.searchUsers = async function() {
            const query = document.getElementById('search-user-input').value.trim().toLowerCase();
            const resultsDiv = document.getElementById('search-results');
            
            if (!query || query.length < 2) {
                resultsDiv.innerHTML = '<p style="color:#999;text-align:center;padding:10px;">Введите минимум 2 символа</p>';
                return;
            }

            const usersSnap = await getDocs(collection(db, "users"));
            const results = [];
            usersSnap.forEach(doc => {
                const data = doc.data();
                const uid = doc.id;
                if (uid === window.currentUser?.uid) return; // Пропускаем себя
                if (data.nickname?.toLowerCase().includes(query) || data.email?.toLowerCase().includes(query)) {
                    results.push({ uid, ...data });
                }
            });

            if (results.length === 0) {
                resultsDiv.innerHTML = '<p style="color:#999;text-align:center;padding:10px;">Никого не найдено</p>';
            } else {
                resultsDiv.innerHTML = results.map(u => `
                    <div class="search-result-item" onclick="startChat('${u.uid}', '${u.nickname || u.email}', '${u.email}')">
                        <img src="${getAvatarUrl(u.nickname || u.email)}" width="40" height="40" style="border-radius:50%;">
                        <div>
                            <strong>${u.nickname || u.email?.split('@')[0]}</strong><br>
                            <small style="color:#999;">${u.email}</small>
                        </div>
                    </div>
                `).join('');
            }
        };

        // Открыть/закрыть поиск
        window.openSearchModal = function() {
            document.getElementById('search-modal').classList.add('show');
            document.getElementById('search-user-input').value = '';
            document.getElementById('search-results').innerHTML = '';
        };
        window.closeSearchModal = function() {
            document.getElementById('search-modal').classList.remove('show');
        };

        // Настройки
        window.openSettingsModal = function() {
            if (!window.currentUser) return;
            document.getElementById('settings-modal').classList.add('show');
            document.getElementById('settings-nickname').value = window.currentUser.displayName || window.currentUser.email?.split('@')[0] || '';
            document.getElementById('settings-email').value = window.currentUser.email || '';
            document.getElementById('settings-avatar-preview').src = getAvatarUrl(window.currentUser.displayName || window.currentUser.email);
        };
        window.closeSettingsModal = function() {
            document.getElementById('settings-modal').classList.remove('show');
        };
        window.saveSettings = async function() {
            const newNickname = document.getElementById('settings-nickname').value.trim();
            if (!newNickname || newNickname.length < 3) {
                alert('Никнейм должен быть не короче 3 символов');
                return;
            }
            try {
                await updateProfile(auth.currentUser, { displayName: newNickname });
                await updateDoc(doc(db, "users", window.currentUser.uid), { nickname: newNickname });
                document.getElementById('settings-modal').classList.remove('show');
                loadContacts();
            } catch (e) {
                alert('Ошибка: ' + e.message);
            }
        };

        // Чат
        window.startChat = function(uid, nickname, email) {
            window.currentChat = { uid, nickname, email };
            document.getElementById('welcome-screen').style.display = 'none';
            document.getElementById('chat-screen').style.display = 'flex';
            document.getElementById('chat-user-name').textContent = nickname || email?.split('@')[0];
            document.getElementById('chat-user-status').textContent = 'в сети';
            document.getElementById('chat-avatar-img').src = getAvatarUrl(nickname || email);
            loadMessages();
        };

        function loadMessages() {
            if (!window.currentChat || !window.currentUser) return;
            const chatId = [window.currentUser.uid, window.currentChat.uid].sort().join('_');
            const container = document.getElementById('messages-container');
            
            const q = query(collection(db, `chats/${chatId}/messages`), orderBy("timestamp", "asc"));
            
            onSnapshot(q, (snapshot) => {
                container.innerHTML = '';
                if (snapshot.empty) {
                    container.innerHTML = '<div class="empty-chat">📭 Пока нет сообщений. Напишите первое!</div>';
                    return;
                }
                snapshot.forEach(doc => {
                    const msg = doc.data();
                    const isSent = msg.uid === window.currentUser.uid;
                    const div = document.createElement('div');
                    div.className = `message ${isSent ? 'sent' : 'received'}`;
                    div.innerHTML = `
                        <span class="msg-sender">${(msg.nickname || msg.email?.split('@')[0] || 'Аноним')}</span>
                        ${escapeHtml(msg.text)}
                    `;
                    container.appendChild(div);
                });
                container.scrollTop = container.scrollHeight;
            });
        }

        window.sendMessage = async function() {
            const input = document.getElementById('message-input');
            const text = input.value.trim();
            if (!text || !window.currentChat || !window.currentUser) return;

            const chatId = [window.currentUser.uid, window.currentChat.uid].sort().join('_');
            
            try {
                await addDoc(collection(db, `chats/${chatId}/messages`), {
                    text,
                    uid: window.currentUser.uid,
                    nickname: window.currentUser.displayName || window.currentUser.email?.split('@')[0],
                    email: window.currentUser.email,
                    timestamp: serverTimestamp()
                });
                input.value = '';
                // Обновить список контактов
                loadContacts();
            } catch (e) {
                console.error('Ошибка отправки:', e);
            }
        };

        window.handleEnter = function(e) {
            if (e.key === 'Enter') sendMessage();
        };

        // Список контактов
        async function loadContacts() {
            if (!window.currentUser) return;
            const container = document.getElementById('contacts-list');
            
            try {
                const usersSnap = await getDocs(collection(db, "users"));
                const contacts = [];
                usersSnap.forEach(doc => {
                    if (doc.id !== window.currentUser.uid) {
                        contacts.push({ uid: doc.id, ...doc.data() });
                    }
                });
                
                if (contacts.length === 0) {
                    container.innerHTML = '<div class="no-contacts">🔍 Используйте поиск, чтобы найти собеседников</div>';
                } else {
                    container.innerHTML = contacts.map(c => `
                        <div class="contact-item" onclick="startChat('${c.uid}', '${c.nickname || c.email?.split('@')[0]}', '${c.email}')">
                            <div class="avatar">
                                <img src="${getAvatarUrl(c.nickname || c.email)}" width="48" height="48" style="border-radius:50%;">
                                <div class="online-dot"></div>
                            </div>
                            <div class="contact-info">
                                <div class="contact-name">${c.nickname || c.email?.split('@')[0]}</div>
                                <div class="contact-lastmsg">Нажмите, чтобы открыть чат</div>
                            </div>
                        </div>
                    `).join('');
                }
            } catch (e) {
                console.error('Ошибка загрузки контактов:', e);
            }
        }

        window.filterContacts = function() {
            const q = document.getElementById('contact-search').value.toLowerCase();
            const items = document.querySelectorAll('.contact-item');
            items.forEach(item => {
                const name = item.querySelector('.contact-name')?.textContent?.toLowerCase() || '';
                item.style.display = name.includes(q) ? '' : 'none';
            });
        };

        // Наблюдатель авторизации
        onAuthStateChanged(auth, async (user) => {
            window.currentUser = user;
            if (user) {
                document.getElementById('auth-screen').style.display = 'none';
                document.getElementById('main-container').style.display = 'flex';
                await ensureUserDocument(user);
                loadContacts();
            } else {
                document.getElementById('auth-screen').style.display = 'flex';
                document.getElementById('main-container').style.display = 'none';
                document.getElementById('error-msg').classList.remove('show');
            }
        });

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function getRussianError(code) {
            const errors = {
                'auth/email-already-in-use': 'Этот email уже занят',
                'auth/invalid-email': 'Некорректный email',
                'auth/weak-password': 'Пароль минимум 6 символов',
                'auth/user-not-found': 'Пользователь не найден',
                'auth/wrong-password': 'Неверный пароль',
                'auth/invalid-credential': 'Неверный email или пароль'
            };
            return errors[code] || 'Произошла ошибка. Попробуйте снова.';
        }
    </script>
</body>
</html>
