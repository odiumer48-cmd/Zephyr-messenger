<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>⚡ Zephyr Messenger</title>
    <style>
        :root {
            --primary: #6C5CE7;
            --primary-dark: #5A4BD1;
            --primary-light: #A29BFE;
            --bg: #F8F9FD;
            --surface: #FFFFFF;
            --text: #2D3436;
            --text-secondary: #636E72;
            --border: #E2E8F0;
            --online: #00B894;
            --sent-msg: linear-gradient(135deg, #6C5CE7, #A29BFE);
            --received-msg: #F1F3F9;
            --sidebar-bg: #FAFBFC;
            --hover: #EDEFF7;
            --selected: #E8E6FF;
            --input-bg: #FFFFFF;
            --shadow: 0 4px 20px rgba(0,0,0,0.1);
            --radius: 16px;
            --transition: 0.3s;
            --animations: 1;
        }

        body.optimized {
            --shadow: none;
            --radius: 8px;
            --transition: 0s;
            --animations: 0;
        }

        body.theme-dark {
            --primary: #A29BFE;
            --primary-dark: #8B7DF7;
            --primary-light: #6C5CE7;
            --bg: #1A1A2E;
            --surface: #16213E;
            --text: #E0E0E0;
            --text-secondary: #A0A0B0;
            --border: #2A2A4A;
            --received-msg: #2A2A4A;
            --sidebar-bg: #12122A;
            --hover: #1E1E40;
            --selected: #252550;
            --input-bg: #1E1E40;
        }

        body.theme-green {
            --primary: #00B894;
            --primary-dark: #00A381;
            --primary-light: #55EFC4;
            --bg: #F0FFF8;
            --sidebar-bg: #E8FFF4;
            --hover: #D4FFE8;
            --selected: #B8FFDC;
            --sent-msg: linear-gradient(135deg, #00B894, #55EFC4);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: var(--bg);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 10px;
            transition: background var(--transition);
        }

        .container {
            width: 100%;
            max-width: 900px;
            height: 95vh;
            background: var(--surface);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            display: flex;
            overflow: hidden;
            transition: all var(--transition);
        }

        /* ── Боковая панель ── */
        .sidebar {
            width: 300px;
            min-width: 250px;
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            background: var(--sidebar-bg);
            flex-shrink: 0;
            transition: all var(--transition);
        }

        .sidebar-header {
            padding: 15px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .logo-text {
            font-size: 20px;
            font-weight: 700;
            color: var(--primary);
        }

        .header-actions { display: flex; gap: 6px; }

        .icon-btn {
            width: 34px;
            height: 34px;
            border-radius: 50%;
            border: none;
            background: var(--surface);
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: var(--shadow);
            transition: all var(--transition);
        }

        .icon-btn:active { background: var(--primary); color: white; }

        .search-box {
            padding: 10px 14px;
            position: relative;
        }

        .search-box input {
            width: 100%;
            padding: 10px 12px 10px 34px;
            border: 1px solid var(--border);
            border-radius: 20px;
            font-size: 14px;
            background: var(--input-bg);
            color: var(--text);
            outline: none;
            transition: all var(--transition);
        }

        .search-box input:focus { border-color: var(--primary); }
        .search-box .search-icon { position: absolute; left: 24px; top: 18px; font-size: 14px; }

        .contacts-list {
            flex: 1;
            overflow-y: auto;
            padding: 6px;
        }

        .contact-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px;
            border-radius: 10px;
            cursor: pointer;
            transition: all var(--transition);
            margin-bottom: 2px;
        }

        .contact-item:active { background: var(--hover); }
        .contact-item.selected { background: var(--selected); }

        .avatar {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            flex-shrink: 0;
            overflow: hidden;
            position: relative;
        }
        .avatar img { width: 100%; height: 100%; object-fit: cover; }
        .online-dot {
            width: 8px;
            height: 8px;
            background: var(--online);
            border-radius: 50%;
            border: 2px solid var(--surface);
            position: absolute;
            bottom: 0;
            right: 0;
        }

        .contact-info { flex: 1; min-width: 0; }
        .contact-name {
            font-weight: 600;
            font-size: 14px;
            color: var(--text);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .contact-lastmsg {
            font-size: 12px;
            color: var(--text-secondary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .no-contacts {
            text-align: center;
            color: var(--text-secondary);
            padding: 30px 15px;
            font-size: 13px;
        }

        /* ── Чат ── */
        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-width: 0;
            background: var(--surface);
        }

        .chat-header {
            padding: 12px 16px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            flex-shrink: 0;
        }

        .chat-user { display: flex; align-items: center; gap: 10px; }
        .chat-user .avatar { width: 38px; height: 38px; }
        .chat-user-name { font-weight: 600; font-size: 15px; color: var(--text); }
        .chat-user-status { font-size: 11px; color: var(--online); font-weight: 500; }

        .messages-container {
            flex: 1;
            padding: 15px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 6px;
            background: var(--sidebar-bg);
        }

        .message {
            max-width: 80%;
            padding: 8px 14px;
            border-radius: 16px;
            font-size: 14px;
            line-height: 1.4;
            word-break: break-word;
            overflow-wrap: break-word;
            hyphens: auto;
            flex-shrink: 0;
        }

        body:not(.optimized) .message { animation: fadeIn 0.2s ease; }

        .message.sent {
            align-self: flex-end;
            background: var(--sent-msg);
            color: white;
            border-bottom-right-radius: 4px;
        }

        .message.received {
            align-self: flex-start;
            background: var(--received-msg);
            color: var(--text);
            border-bottom-left-radius: 4px;
        }

        .message .msg-sender {
            font-size: 10px;
            font-weight: 700;
            margin-bottom: 2px;
            opacity: 0.7;
            display: block;
        }

        .message-input-area {
            display: flex;
            padding: 10px 14px;
            gap: 8px;
            border-top: 1px solid var(--border);
            background: var(--surface);
            align-items: center;
            flex-shrink: 0;
        }

        .message-input-area input {
            flex: 1;
            padding: 10px 16px;
            border: 1px solid var(--border);
            border-radius: 20px;
            font-size: 14px;
            outline: none;
            background: var(--input-bg);
            color: var(--text);
            min-width: 0;
        }

        .message-input-area input:focus { border-color: var(--primary); }

        .btn-send {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            background: var(--primary);
            color: white;
            border: none;
            font-size: 16px;
            cursor: pointer;
            flex-shrink: 0;
        }

        .btn-send:active { background: var(--primary-dark); }

        /* ── Экран логина ── */
        .auth-screen {
            width: 100%;
            max-width: 400px;
            margin: auto;
            padding: 30px 25px;
            background: var(--surface);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            text-align: center;
            transition: all var(--transition);
        }

        .auth-screen .logo { font-size: 40px; margin-bottom: 8px; }
        .auth-screen h1 { font-size: 24px; color: var(--text); margin-bottom: 4px; }
        .auth-screen .subtitle { color: var(--text-secondary); margin-bottom: 20px; font-size: 13px; }

        .auth-form { display: flex; flex-direction: column; gap: 10px; }

        .auth-form input {
            padding: 12px 14px;
            border: 1px solid var(--border);
            border-radius: 10px;
            font-size: 14px;
            outline: none;
            background: var(--input-bg);
            color: var(--text);
            width: 100%;
        }

        .auth-form input:focus { border-color: var(--primary); }

        .btn {
            padding: 12px;
            border: none;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all var(--transition);
        }

        .btn-primary { background: var(--primary); color: white; }
        .btn-primary:active { background: var(--primary-dark); }
        .btn-link { background: none; color: var(--primary); font-weight: 500; }

        .error-msg {
            color: #E74C3C;
            font-size: 12px;
            background: #FFF0F0;
            padding: 8px;
            border-radius: 6px;
            display: none;
            word-break: break-word;
        }
        .error-msg.show { display: block; }

        /* Селектор темы */
        .option-row {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin: 8px 0;
            flex-wrap: wrap;
        }

        .theme-dot {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            border: 2px solid transparent;
            cursor: pointer;
        }
        .theme-dot.active { border-color: var(--primary); }
        .dot-light { background: #F0F0F5; border: 1px solid #ccc; }
        .dot-dark { background: #1A1A2E; }
        .dot-green { background: #E0FFF0; border: 1px solid #00B894; }

        .mode-btn {
            padding: 8px 16px;
            border: 2px solid var(--border);
            border-radius: 10px;
            background: var(--surface);
            color: var(--text);
            font-size: 13px;
            cursor: pointer;
            font-weight: 500;
        }
        .mode-btn.active { border-color: var(--primary); background: var(--selected); }

        /* ── Модалки ── */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.5);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            padding: 15px;
        }
        .modal-overlay.show { display: flex; }

        .modal {
            background: var(--surface);
            border-radius: var(--radius);
            padding: 20px;
            max-width: 380px;
            width: 100%;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            color: var(--text);
            max-height: 90vh;
            overflow-y: auto;
        }

        .modal h3 { text-align: center; margin-bottom: 15px; font-size: 16px; }
        .form-group { margin-bottom: 12px; }
        .form-group label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            color: var(--text-secondary);
            margin-bottom: 4px;
        }
        .form-group input {
            width: 100%;
            padding: 10px;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 14px;
            background: var(--input-bg);
            color: var(--text);
            outline: none;
        }

        .avatar-preview {
            width: 64px;
            height: 64px;
            border-radius: 50%;
            margin: 0 auto 12px;
            display: block;
        }

        .avatar-styles {
            display: flex;
            gap: 8px;
            justify-content: center;
            flex-wrap: wrap;
            margin-bottom: 12px;
        }

        .avatar-style-option {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            border: 2px solid transparent;
            overflow: hidden;
        }
        .avatar-style-option.selected { border-color: var(--primary); }
        .avatar-style-option img { width: 100%; height: 100%; }

        .search-results { max-height: 180px; overflow-y: auto; }
        .search-result-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px;
            cursor: pointer;
            border-radius: 8px;
        }
        .search-result-item:active { background: var(--hover); }

        .empty-chat {
            text-align: center;
            color: var(--text-secondary);
            margin-top: 120px;
            font-size: 14px;
        }

        .welcome-screen {
            text-align: center;
            margin-top: 80px;
            flex: 1;
        }
        .welcome-screen .big-logo { font-size: 56px; margin-bottom: 16px; }
        .welcome-screen h2 { color: var(--text); font-size: 18px; margin-bottom: 6px; }
        .welcome-screen p { color: var(--text-secondary); font-size: 13px; }

        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #ccc; border-radius: 4px; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(6px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Адаптив */
        @media (max-width: 600px) {
            .container { height: 100vh; border-radius: 0; }
            .sidebar { width: 80px; min-width: 60px; }
            .sidebar .logo-text { display: none; }
            .sidebar .search-box { display: none; }
            .sidebar .contact-info { display: none; }
            .sidebar .contact-item { justify-content: center; }
            .sidebar .header-actions { flex-direction: column; gap: 8px; }
            .auth-screen { padding: 20px 15px; }
        }
    </style>
</head>
<body>
    <!-- Основной чат -->
    <div class="container" id="main-container" style="display:none;">
        <!-- Боковая панель -->
        <div class="sidebar">
            <div class="sidebar-header">
                <span class="logo-text">⚡ Zephyr</span>
                <div class="header-actions">
                    <button class="icon-btn" onclick="openSearchModal()" title="Поиск">🔍</button>
                    <button class="icon-btn" onclick="openSettingsModal()" title="Настройки">⚙️</button>
                    <button class="icon-btn" onclick="logout()" title="Выйти" style="color:#E74C3C;">✕</button>
                </div>
            </div>
            <div class="search-box">
                <span class="search-icon">🔍</span>
                <input type="text" id="contact-search" placeholder="Поиск чатов..." oninput="filterContacts()">
            </div>
            <div class="contacts-list" id="contacts-list">
                <div class="no-contacts">Используйте 🔍 чтобы найти собеседников</div>
            </div>
        </div>

        <!-- Область чата -->
        <div class="chat-area">
            <div id="welcome-screen" class="welcome-screen">
                <div class="big-logo">⚡</div>
                <h2>Добро пожаловать в Zephyr</h2>
                <p>Выберите чат или найдите собеседника</p>
            </div>
            <div id="chat-screen" style="display:none; flex:1; flex-direction:column;">
                <div class="chat-header">
                    <div class="chat-user">
                        <div class="avatar"><img id="chat-avatar-img" src="" alt=""></div>
                        <div>
                            <div class="chat-user-name" id="chat-user-name">—</div>
                            <div class="chat-user-status" id="chat-user-status">в сети</div>
                        </div>
                    </div>
                </div>
                <div class="messages-container" id="messages-container"></div>
                <div class="message-input-area">
                    <input type="text" id="message-input" placeholder="Сообщение..." onkeypress="if(event.key==='Enter')sendMessage()">
                    <button class="btn-send" onclick="sendMessage()">➤</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Экран входа -->
    <div class="auth-screen" id="auth-screen">
        <div class="logo">⚡</div>
        <h1>Zephyr</h1>
        <p class="subtitle">Лёгкий и быстрый мессенджер</p>

        <!-- Выбор темы -->
        <p style="font-size:12px;color:var(--text-secondary);margin-bottom:6px;">Тема</p>
        <div class="option-row">
            <button class="theme-dot dot-light active" onclick="setTheme('light')" title="Светлая"></button>
            <button class="theme-dot dot-dark" onclick="setTheme('dark')" title="Тёмная"></button>
            <button class="theme-dot dot-green" onclick="setTheme('green')" title="Зелёная"></button>
        </div>

        <!-- Выбор режима -->
        <p style="font-size:12px;color:var(--text-secondary);margin-bottom:6px;">Режим</p>
        <div class="option-row">
            <button class="mode-btn active" onclick="setMode('normal')">Полный</button>
            <button class="mode-btn" onclick="setMode('optimized')">Оптимизированный</button>
        </div>

        <form class="auth-form" onsubmit="handleAuth(event)" style="margin-top:10px;">
            <input type="text" id="auth-nickname" placeholder="Никнейм" required minlength="3" autocomplete="username">
            <input type="email" id="auth-email" placeholder="Email" required autocomplete="email">
            <input type="password" id="auth-password" placeholder="Пароль (мин. 6 символов)" required minlength="6" autocomplete="current-password">
            <div class="error-msg" id="error-msg"></div>
            <button type="submit" class="btn btn-primary" id="auth-btn">Войти</button>
            <button type="button" class="btn btn-link" onclick="toggleAuthMode()" id="toggle-btn">
                Нет аккаунта? Зарегистрироваться
            </button>
        </form>
    </div>

    <!-- Модальное окно поиска -->
    <div class="modal-overlay" id="search-modal">
        <div class="modal">
            <h3>🔍 Найти пользователя</h3>
            <div class="form-group">
                <input type="text" id="search-user-input" placeholder="Введите никнейм..." oninput="searchUsers()" autocomplete="off">
            </div>
            <div class="search-results" id="search-results"></div>
            <button class="btn btn-link" onclick="closeSearchModal()" style="margin-top:8px;width:100%;">Закрыть</button>
        </div>
    </div>

    <!-- Модальное окно настроек -->
    <div class="modal-overlay" id="settings-modal">
        <div class="modal">
            <h3>⚙️ Настройки профиля</h3>
            <img class="avatar-preview" id="settings-avatar-preview" src="" alt="Аватар">

            <p style="font-size:12px;color:var(--text-secondary);text-align:center;margin-bottom:6px;">Стиль аватарки</p>
            <div class="avatar-styles" id="avatar-styles-container"></div>

            <div class="form-group">
                <label>Никнейм</label>
                <input type="text" id="settings-nickname" placeholder="Новый никнейм" minlength="3">
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="settings-email" disabled style="opacity:0.6;">
            </div>

            <p style="font-size:11px;color:var(--text-secondary);text-align:center;margin:6px 0;">Тема</p>
            <div class="option-row">
                <button class="theme-dot dot-light" onclick="setTheme('light')"></button>
                <button class="theme-dot dot-dark" onclick="setTheme('dark')"></button>
                <button class="theme-dot dot-green" onclick="setTheme('green')"></button>
            </div>

            <button class="btn btn-primary" onclick="saveSettings()" style="margin-top:10px;width:100%;">Сохранить</button>
            <button class="btn btn-link" onclick="closeSettingsModal()" style="width:100%;">Отмена</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
        import { 
            getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, 
            signOut, onAuthStateChanged, updateProfile 
        } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js';
        import { 
            getFirestore, collection, addDoc, query, orderBy, onSnapshot, 
            serverTimestamp, getDocs, doc, updateDoc, setDoc 
        } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js';

        const firebaseConfig = {
            apiKey: "AIzaSyDl-pnacA5QLflfbsKWdDTON-AYFJ_HvLY",
            authDomain: "zephyr-messengerer.firebaseapp.com",
            projectId: "zephyr-messengerer",
            storageBucket: "zephyr-messengerer.firebasestorage.app",
            messagingSenderId: "869084755932",
            appId: "1:869084755932:web:4220f1f8a642d519920119"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        window.currentUser = null;
        window.currentChat = null;
        window.isLoginMode = true;
        window.currentAvatarStyle = localStorage.getItem('zephyr-avatar-style') || 'initials';

        // Применяем сохранённые настройки
        const savedTheme = localStorage.getItem('zephyr-theme') || 'light';
        const savedMode = localStorage.getItem('zephyr-mode') || 'normal';
        document.body.className = 'theme-' + savedTheme + (savedMode === 'optimized' ? ' optimized' : '');
        if (savedMode === 'optimized') {
            document.querySelector('.mode-btn:nth-child(2)')?.classList.add('active');
            document.querySelector('.mode-btn:nth-child(1)')?.classList.remove('active');
        }

        const avatarStyles = ['initials', 'bottts', 'avataaars', 'lorelei', 'pixel-art', 'identicon', 'rings', 'thumbs'];

        function getAvatarUrl(nickname, style) {
            const seed = encodeURIComponent(String(nickname || 'user').trim());
            const s = style || window.currentAvatarStyle || 'initials';
            return `https://api.dicebear.com/9.x/${s}/svg?seed=${seed}&backgroundColor=6C5CE7,A29BFE,00B894,FF7675,FDCB6E,74B9FF`;
        }

        // ── Темы и режимы ──
        window.setTheme = function(theme) {
            document.body.className = 'theme-' + theme + (localStorage.getItem('zephyr-mode') === 'optimized' ? ' optimized' : '');
            localStorage.setItem('zephyr-theme', theme);
            document.querySelectorAll('.theme-dot').forEach(d => d.classList.remove('active'));
            document.querySelector('.dot-' + theme)?.classList.add('active');
        };

        window.setMode = function(mode) {
            if (mode === 'optimized') {
                document.body.classList.add('optimized');
                document.querySelectorAll('.mode-btn')[1]?.classList.add('active');
                document.querySelectorAll('.mode-btn')[0]?.classList.remove('active');
            } else {
                document.body.classList.remove('optimized');
                document.querySelectorAll('.mode-btn')[0]?.classList.add('active');
                document.querySelectorAll('.mode-btn')[1]?.classList.remove('active');
            }
            localStorage.setItem('zephyr-mode', mode);
        };

        // ── Авторизация ──
        window.toggleAuthMode = function() {
            window.isLoginMode = !window.isLoginMode;
            document.getElementById('auth-btn').textContent = window.isLoginMode ? 'Войти' : 'Зарегистрироваться';
            document.getElementById('toggle-btn').textContent = window.isLoginMode ? 'Нет аккаунта? Зарегистрироваться' : 'Уже есть аккаунт? Войти';
            document.getElementById('error-msg').classList.remove('show');
        };

        window.handleAuth = async function(e) {
            e.preventDefault();
            const nickname = document.getElementById('auth-nickname').value.trim();
            const email = document.getElementById('auth-email').value.trim();
            const password = document.getElementById('auth-password').value;
            const errorEl = document.getElementById('error-msg');

            try {
                let userCredential;
                if (window.isLoginMode) {
                    userCredential = await signInWithEmailAndPassword(auth, email, password);
                } else {
                    userCredential = await createUserWithEmailAndPassword(auth, email, password);
                    await updateProfile(userCredential.user, { displayName: nickname });
                    // Сохраняем в Firestore (используем setDoc с merge)
                    await setDoc(doc(db, "users", userCredential.user.uid), {
                        nickname: nickname,
                        email: email,
                        createdAt: serverTimestamp()
                    }, { merge: true });
                }
            } catch (error) {
                errorEl.textContent = '⚠️ ' + getRussianError(error.code);
                errorEl.classList.add('show');
            }
        };

        window.logout = async () => { await signOut(auth); };

        // ── Поиск пользователей (исправленный) ──
        window.searchUsers = async function() {
            const input = document.getElementById('search-user-input');
            const searchText = input.value.trim().toLowerCase();
            const div = document.getElementById('search-results');

            if (!searchText || searchText.length < 2) {
                div.innerHTML = '<p style="color:var(--text-secondary);text-align:center;padding:8px;">Введите минимум 2 символа</p>';
                return;
            }

            const snap = await getDocs(collection(db, "users"));
            const results = [];
            snap.forEach(d => {
                const data = d.data();
                if (d.id === window.currentUser?.uid) return;
                const nick = (data.nickname || '').toLowerCase();
                const mail = (data.email || '').toLowerCase();
                if (nick.includes(searchText) || mail.includes(searchText)) {
                    results.push({ uid: d.id, ...data });
                }
            });

            if (results.length === 0) {
                div.innerHTML = '<p style="color:var(--text-secondary);text-align:center;padding:8px;">Никого не найдено</p>';
            } else {
                div.innerHTML = results.map(u => `
                    <div class="search-result-item" onclick="startChat('${u.uid}', '${escapeAttr(u.nickname || u.email?.split('@')[0])}', '${escapeAttr(u.email)}')">
                        <img src="${getAvatarUrl(u.nickname || u.email)}" width="36" height="36" style="border-radius:50%;">
                        <div>
                            <strong>${escapeHtml(u.nickname || u.email?.split('@')[0])}</strong><br>
                            <small style="color:var(--text-secondary);">${escapeHtml(u.email)}</small>
                        </div>
                    </div>
                `).join('');
            }
        };

        window.openSearchModal = () => {
            document.getElementById('search-modal').classList.add('show');
            document.getElementById('search-user-input').value = '';
            document.getElementById('search-results').innerHTML = '<p style="color:var(--text-secondary);text-align:center;padding:8px;">Введите минимум 2 символа</p>';
            setTimeout(() => document.getElementById('search-user-input').focus(), 100);
        };
        window.closeSearchModal = () => document.getElementById('search-modal').classList.remove('show');

        // ── Настройки профиля ──
        window.openSettingsModal = function() {
            if (!window.currentUser) return;
            document.getElementById('settings-modal').classList.add('show');
            document.getElementById('settings-nickname').value = window.currentUser.displayName || '';
            document.getElementById('settings-email').value = window.currentUser.email || '';
            document.getElementById('settings-avatar-preview').src = getAvatarUrl(window.currentUser.displayName || window.currentUser.email);
            renderAvatarStyles();
            setTimeout(() => document.getElementById('settings-nickname').focus(), 100);
        };
        window.closeSettingsModal = () => document.getElementById('settings-modal').classList.remove('show');

        function renderAvatarStyles() {
            const container = document.getElementById('avatar-styles-container');
            const nickname = document.getElementById('settings-nickname').value || window.currentUser?.displayName || 'user';
            container.innerHTML = avatarStyles.map(style => `
                <div class="avatar-style-option ${style === window.currentAvatarStyle ? 'selected' : ''}" 
                     onclick="selectAvatarStyle('${style}')" title="${style}">
                    <img src="${getAvatarUrl(nickname, style)}" alt="${style}">
                </div>
            `).join('');
        }

        window.selectAvatarStyle = function(style) {
            window.currentAvatarStyle = style;
            localStorage.setItem('zephyr-avatar-style', style);
            document.getElementById('settings-avatar-preview').src = getAvatarUrl(
                document.getElementById('settings-nickname').value || window.currentUser?.displayName || 'user', style
            );
            renderAvatarStyles();
        };

        window.saveSettings = async function() {
            const newNickname = document.getElementById('settings-nickname').value.trim();
            if (!newNickname || newNickname.length < 3) {
                alert('Никнейм должен быть не короче 3 символов');
                return;
            }
            try {
                // Обновляем профиль в Auth
                await updateProfile(auth.currentUser, { displayName: newNickname });
                // Обновляем в Firestore
                await setDoc(doc(db, "users", window.currentUser.uid), {
                    nickname: newNickname,
                    email: window.currentUser.email,
                    avatarStyle: window.currentAvatarStyle,
                    updatedAt: serverTimestamp()
                }, { merge: true });
                document.getElementById('settings-modal').classList.remove('show');
                loadContacts(); // Обновляем список
            } catch (e) {
                alert('Ошибка: ' + e.message);
            }
        };

        // Обновляем превью аватарки при вводе ника в настройках
        document.addEventListener('DOMContentLoaded', () => {
            const nickInput = document.getElementById('settings-nickname');
            if (nickInput) {
                nickInput.addEventListener('input', function() {
                    const val = this.value || window.currentUser?.displayName || 'user';
                    document.getElementById('settings-avatar-preview').src = getAvatarUrl(val);
                    renderAvatarStyles();
                });
            }
        });

        // ── Чат ──
        window.startChat = function(uid, nickname, email) {
            window.currentChat = { uid, nickname, email };
            document.getElementById('welcome-screen').style.display = 'none';
            document.getElementById('chat-screen').style.display = 'flex';
            document.getElementById('chat-user-name').textContent = nickname || email?.split('@')[0] || '—';
            document.getElementById('chat-user-status').textContent = 'в сети';
            document.getElementById('chat-avatar-img').src = getAvatarUrl(nickname || email);
            loadMessages();
        };

        function loadMessages() {
            if (!window.currentChat || !window.currentUser) return;
            const chatId = [window.currentUser.uid, window.currentChat.uid].sort().join('_');
            const container = document.getElementById('messages-container');
            const q = query(collection(db, `chats/${chatId}/messages`), orderBy("timestamp", "asc"));

            onSnapshot(q, (snapshot) => {
                container.innerHTML = '';
                if (snapshot.empty) {
                    container.innerHTML = '<div class="empty-chat">📭 Пока нет сообщений</div>';
                    return;
                }
                snapshot.forEach(doc => {
                    const msg = doc.data();
                    const isSent = msg.uid === window.currentUser.uid;
                    const div = document.createElement('div');
                    div.className = `message ${isSent ? 'sent' : 'received'}`;
                    const sender = escapeHtml(msg.nickname || msg.email?.split('@')[0] || 'Аноним');
                    div.innerHTML = `<span class="msg-sender">${sender}</span>${escapeHtml(msg.text)}`;
                    container.appendChild(div);
                });
                container.scrollTop = container.scrollHeight;
            });
        }

        window.sendMessage = async function() {
            const input = document.getElementById('message-input');
            const text = input.value.trim();
            if (!text || !window.currentChat || !window.currentUser) return;

            const chatId = [window.currentUser.uid, window.currentChat.uid].sort().join('_');
            try {
                await addDoc(collection(db, `chats/${chatId}/messages`), {
                    text,
                    uid: window.currentUser.uid,
                    nickname: window.currentUser.displayName || window.currentUser.email?.split('@')[0] || 'Аноним',
                    email: window.currentUser.email,
                    timestamp: serverTimestamp()
                });
                input.value = '';
                loadContacts();
            } catch (e) {
                console.error('Ошибка:', e);
            }
        };

        // ── Контакты ──
        async function loadContacts() {
            if (!window.currentUser) return;
            const container = document.getElementById('contacts-list');
            try {
                const snap = await getDocs(collection(db, "users"));
                const contacts = [];
                snap.forEach(d => {
                    if (d.id !== window.currentUser.uid) {
                        contacts.push({ uid: d.id, ...d.data() });
                    }
                });

                if (contacts.length === 0) {
                    container.innerHTML = '<div class="no-contacts">🔍 Используйте поиск</div>';
                } else {
                    container.innerHTML = contacts.map(c => `
                        <div class="contact-item" onclick="startChat('${c.uid}', '${escapeAttr(c.nickname || c.email?.split('@')[0])}', '${escapeAttr(c.email)}')">
                            <div class="avatar">
                                <img src="${getAvatarUrl(c.nickname || c.email, c.avatarStyle)}" width="42" height="42" alt="">
                                <div class="online-dot"></div>
                            </div>
                            <div class="contact-info">
                                <div class="contact-name">${escapeHtml(c.nickname || c.email?.split('@')[0])}</div>
                                <div class="contact-lastmsg">Нажмите для чата</div>
                            </div>
                        </div>
                    `).join('');
                }
            } catch (e) {
                console.error('Ошибка загрузки:', e);
            }
        }

        window.filterContacts = function() {
            const q = document.getElementById('contact-search').value.toLowerCase();
            document.querySelectorAll('.contact-item').forEach(item => {
                const name = item.querySelector('.contact-name')?.textContent?.toLowerCase() || '';
                item.style.display = name.includes(q) ? '' : 'none';
            });
        };

        window.ensureUserDocument = async function(user) {
            if (!user) return;
            const userRef = doc(db, "users", user.uid);
            // Всегда обновляем никнейм при входе (чтобы синхронизировать с Auth)
            await setDoc(userRef, {
                nickname: user.displayName || user.email?.split('@')[0] || 'User',
                email: user.email,
                updatedAt: serverTimestamp()
            }, { merge: true });
        };

        // ── Отслеживание входа ──
        onAuthStateChanged(auth, async (user) => {
            window.currentUser = user;
            if (user) {
                document.getElementById('auth-screen').style.display = 'none';
                document.getElementById('main-container').style.display = 'flex';
                await window.ensureUserDocument(user);
                loadContacts();
            } else {
                document.getElementById('auth-screen').style.display = 'block';
                document.getElementById('main-container').style.display = 'none';
                document.getElementById('error-msg').classList.remove('show');
            }
        });

        // ── Вспомогательные функции ──
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = String(text || '');
            return div.innerHTML;
        }

        function escapeAttr(text) {
            return String(text || '').replace(/'/g, "\\'").replace(/"/g, '&quot;');
        }

        function getRussianError(code) {
            const errors = {
                'auth/email-already-in-use': 'Этот email уже занят',
                'auth/invalid-email': 'Некорректный email',
                'auth/weak-password': 'Пароль минимум 6 символов',
                'auth/user-not-found': 'Пользователь не найден',
                'auth/wrong-password': 'Неверный пароль',
                'auth/invalid-credential': 'Неверный email или пароль'
            };
            return errors[code] || 'Ошибка. Попробуйте снова.';
        }
    </script>
</body>
</html>
